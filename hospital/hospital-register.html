<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital Registration — MedConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#eaf4fb;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:40px 0;
}

.card{
width:480px;
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
text-align:center;
}

.logo{
height:55px;
margin-bottom:15px;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:1px solid #cbd5e1;
font-size:15px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#0284c7;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#0369a1;
}

.login-link {
    margin-top: 20px;
    font-size: 14px;
    color: #64748b;
}
.login-link a {
    color: #0284c7;
    font-weight: 600;
    text-decoration: none;
}
.login-link a:hover {
    text-decoration: underline;
}
.back-link {
    margin-top: 30px;
    display: block;
    text-align: center;
    color: #94a3b8;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    transition: color 0.2s;
}
.back-link:hover {
    color: #0f172a;
}
</style>
</head>

<body>

<div class="card">

<img src="../images/medconnect-logo.png" class="logo">

<h2>Register Hospital</h2>

<input type="text" id="name" placeholder="Hospital Name">
<input type="email" id="email" placeholder="Official Email">
<input type="password" id="password" placeholder="Create Password">

<input type="text" id="city" placeholder="City">
<input type="number" id="totalBeds" placeholder="Total Beds Available">
<input type="number" id="icuBeds" placeholder="ICU Beds">

<!-- 🔥 IMPORTANT FOR DEMO -->
<input type="number" id="distance" placeholder="Distance from Patient (km)">

<button onclick="registerHospital()">
Register Hospital
</button>

<a href="hospital-login.html" class="back-link">
    &larr; Back to Login
</a>

</div>

<script src="../js/api-config.js"></script>
<script>

async function registerHospital(){

    const btn = document.querySelector("button");

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const city = document.getElementById("city").value.trim();
    const total_beds = document.getElementById("totalBeds").value;
    const icu_beds = document.getElementById("icuBeds").value;
    const distance = document.getElementById("distance").value;

    if(!name || !email || !password || !city || !total_beds || !icu_beds || !distance){
        alert("Please fill all fields");
        return;
    }

    btn.disabled = true;

    try {

        const res = await medconnectFetch("/hospital/register/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: name,
                email: email,
                password: password,
                city: city,
                total_beds: total_beds,
                icu_beds: icu_beds,
                distance: distance
            })
        });

        const data = await res.json();

        if(res.ok){
            btn.innerText = "✅ Successfully Registered!";
            btn.style.background = "#16a34a";
            setTimeout(() => {
                window.location.href = "hospital-login.html";
            }, 800);
        } else {
            alert(data.error || "Registration failed");
            btn.disabled = false;
        }

    } catch (error){
        alert("Server error. Check backend.");
        btn.disabled = false;
    }
}

</script>

</body>
</html>
